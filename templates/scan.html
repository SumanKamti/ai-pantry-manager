{% extends "layout.html" %}

{% block title %}Scan - SnapCook{% endblock %}

{% block content %}
<style>
    .scan-bg {
        background-color: #0f2027; 
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .camera-card {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        width: 100%;
        max-width: 500px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .camera-viewport {
        background: #000;
        width: 100%;
        height: 300px;
        border-radius: 15px;
        margin: 1.5rem 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        position: relative;
        overflow: hidden;
    }

    .camera-viewport img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    .scan-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: #00ff00;
        box-shadow: 0 0 10px #00ff00;
        top: 0;
        animation: scanAnim 3s infinite linear;
    }

    @keyframes scanAnim {
        0% { top: 0; }
        50% { top: 100%; }
        100% { top: 0; }
    }

    .btn-analyze {
        background: linear-gradient(45deg, #11998e, #38ef7d);
        border: none;
        color: white;
        font-weight: 700;
        padding: 14px;
        border-radius: 50px;
        font-size: 1.05rem;
        transition: 0.3s;
        width: 100%;
    }
    .btn-analyze:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
        color: white;
    }

    @media (max-width: 576px) {
        .camera-card { padding: 1.5rem; margin: 0 1rem; }
        .camera-viewport { height: 250px; }
    }
</style>

<div class="scan-bg">
    <div class="camera-card">
        <h3 class="fw-bold text-dark">Scan Ingredient</h3>
        <p class="text-muted small">Upload a photo of a fruit or vegetable to identify it.</p>

        <form action="{{ url_for('scan') }}" method="POST" enctype="multipart/form-data" id="scanForm">
            
            <div class="camera-viewport" id="viewport">
                <div class="scan-line" id="scanLine"></div>
                <div id="placeholderIcon">
                    <i class="bi bi-camera-video-fill display-4 opacity-50"></i>
                    <p class="small opacity-50 mt-2 mb-0">Your image preview will appear here</p>
                </div>
                <img id="imagePreview" src="" alt="Preview" style="display:none;">
            </div>

            <div class="d-grid gap-2">
                <!-- Step 1: Choose Image -->
                <label class="btn btn-primary btn-lg rounded-pill" id="chooseBtn">
                    <i class="bi bi-upload me-2"></i> Choose Image / Camera
                    <input type="file" name="image" accept="image/*" capture="environment" hidden id="fileInput">
                </label>
                
                <!-- Step 2: Analyze (hidden until image selected) -->
                <button type="submit" class="btn btn-analyze d-none" id="analyzeBtn">
                    <i class="bi bi-cpu me-2"></i> Analyze with AI
                </button>

                <!-- Change image link -->
                <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill d-none" id="changeBtn">
                    <i class="bi bi-arrow-repeat me-1"></i> Change Image
                </button>

                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary rounded-pill mt-1">Cancel</a>
            </div>
            
            <div id="loadingMsg" class="mt-3 text-success d-none">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Analyzing image with AI...
            </div>
        </form>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const placeholderIcon = document.getElementById('placeholderIcon');
    const scanLine = document.getElementById('scanLine');
    const chooseBtn = document.getElementById('chooseBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const changeBtn = document.getElementById('changeBtn');
    const scanForm = document.getElementById('scanForm');

    fileInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                placeholderIcon.style.display = 'none';
                scanLine.style.display = 'none';
                chooseBtn.classList.add('d-none');
                analyzeBtn.classList.remove('d-none');
                changeBtn.classList.remove('d-none');
            };
            reader.readAsDataURL(this.files[0]);
        }
    });

    changeBtn.addEventListener('click', function() {
        fileInput.value = '';
        imagePreview.style.display = 'none';
        imagePreview.src = '';
        placeholderIcon.style.display = 'block';
        scanLine.style.display = 'block';
        chooseBtn.classList.remove('d-none');
        analyzeBtn.classList.add('d-none');
        changeBtn.classList.add('d-none');
    });

    scanForm.addEventListener('submit', function() {
        analyzeBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> AI is analyzing...';
        analyzeBtn.classList.add('disabled');
        document.getElementById('loadingMsg').classList.remove('d-none');
    });
</script>
{% endblock %}
